body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;height:54px;gap:0}

.nav-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;flex:1}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{padding:0 0.9rem;height:54px;display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.ntab:hover{color:var(--text)}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ntab .ti{font-size:15px}
.topbar-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0;align-items:center}
#sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0}
#sync-dot.syncing{background:var(--gold)}
#sync-dot.ok{background:var(--green)}
#sync-dot.err{background:var(--red)}
#main{padding:1.5rem;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.ctitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}

.stat-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:1rem 1.1rem}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.br{background:rgba(255,77,94,.15);color:#FF7A87}
.bo{background:rgba(255,107,43,.15);color:#FF8C5C}
.bg2{background:rgba(255,181,71,.15);color:#FFB547}
.bgreen{background:rgba(34,200,127,.15);color:#22C87F}
.bblue{background:rgba(75,159,255,.15);color:#4B9FFF}

.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#ff8050}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--borderS)}

.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-icon{padding:5px;width:28px;height:28px;justify-content:center;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted)}
.btn-icon:hover{color:var(--text);border-color:var(--borderS);background:var(--elevated)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 10px;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}

.fg{margin-bottom:.9rem}

.prog-fill{height:100%;border-radius:2px;background:var(--accent)}

// ======================================================

async function seedIfEmpty(){
  const metaRef = doc(db,'meta','state');
  const metaSnap = await getDoc(metaRef);
  if(metaSnap.exists()) return; // already seeded

  syncDot('syncing');
  const batch = writeBatch(db);

  // Seed each collection (tasks son propiedad exclusiva del sistema externo)
  for(const [col, arr] of Object.entries({
    pipeline:DEFDATA.pipeline,
    projects:DEFDATA.projects,
    contacts:DEFDATA.contacts,
    financial:DEFDATA.financial,
    alliances:DEFDATA.alliances
  })){
    for(const item of arr){
      const ref = doc(db, col, String(item.id));
      batch.set(ref, stripUndefined(item));
    }
  }

  // brain as single doc
  batch.set(doc(db,'meta','brain'), stripUndefined(DEFDATA.brain));
  // foco
  batch.set(doc(db,'meta','foco'), {text: DEFDATA.foco});
  // nid counters
  batch.set(doc(db,'meta','nid'), stripUndefined(DEFDATA.nid));
  // mark seeded
  batch.set(metaRef, {seeded: true});

  await batch.commit();
  syncDot('ok');
}

// ======================================================
// LOAD FROM FIRESTORE (initial)
// ======================================================
async function loadFromFirestore(){
  // Colecciones del sistema principal (sin tasks)
  for(const col of Object.keys(COL)){
    const snap = await getDocs(collection(db, col));
    data[col] = [];
    snap.forEach(d => data[col].push({...d.data(), _fsId: d.id}));
    data[col].forEach(item => { if(typeof item.id === 'string') item.id = parseInt(item.id)||item.id; });
  }

  // Tareas desde proyecto secundario (promesas-tareas) — solo lectura
  try {
    const tasksSnap = await getDocs(collection(dbTasks, 'tasks'));
    data.tasks = [];
    tasksSnap.forEach(d => data.tasks.push({...d.data(), _fsId: d.id}));
  } catch(e) {
    console.warn('No se pudo cargar tasks desde promesas-tareas:', e.message);
    data.tasks = [];
  }

  const brainSnap = await getDoc(doc(db,'meta','brain'));
  if(brainSnap.exists()) data.brain = brainSnap.data();

  const focoSnap = await getDoc(doc(db,'meta','foco'));
  if(focoSnap.exists()) data.foco = focoSnap.data().text || '';

  const nidSnap = await getDoc(doc(db,'meta','nid'));
  if(nidSnap.exists()) data.nid = nidSnap.data();
}

// ======================================================
// REAL-TIME LISTENERS
// ======================================================
function attachListeners(){
  // Unsubscribe previous
  unsubscribers.forEach(u => u());
  unsubscribers = [];

  // Listeners del sistema principal (sin tasks)
  for(const col of Object.keys(COL)){
    const unsub = onSnapshot(collection(db, col), snap => {
      if(!initialized) return;
      data[col] = [];
      snap.forEach(d => {
        const item = {...d.data(), _fsId: d.id};
        if(typeof item.id === 'string') item.id = parseInt(item.id)||item.id;
        data[col].push(item);
      });
      renderContent();
    }, err => console.error('Listener error', col, err));
    unsubscribers.push(unsub);
  }

  // Listener exclusivo de tareas desde promesas-tareas (solo lectura)
  const unsubTasks = onSnapshot(collection(dbTasks, 'tasks'), snap => {
    if(!initialized) return;
    data.tasks = [];
    snap.forEach(d => data.tasks.push({...d.data(), _fsId: d.id}));
    renderContent();
  }, err => console.warn('Listener tasks error:', err.message));
  unsubscribers.push(unsubTasks);

  // brain listener
  const unsubBrain = onSnapshot(doc(db,'meta','brain'), snap => {
    if(!initialized) return;
    if(snap.exists()){
      data.brain = snap.data();
      if(currentTab==='brain') renderContent();
    }
  });
  unsubscribers.push(unsubBrain);

  // foco listener
  const unsubFoco = onSnapshot(doc(db,'meta','foco'), snap => {
    if(!initialized) return;
    if(snap.exists()){
      const newFoco = snap.data().text || '';
      if(newFoco !== data.foco){
        data.foco = newFoco;
        // update textarea if visible without full re-render
        const ta = document.querySelector('.foco-textarea');
        if(ta && document.activeElement !== ta) ta.value = newFoco;
      }
    }
  });
  unsubscribers.push(unsubFoco);

  // nid listener
  const unsubNid = onSnapshot(doc(db,'meta','nid'), snap => {
    if(!initialized) return;
    if(snap.exists()) data.nid = snap.data();
  });
  unsubscribers.push(unsubNid);
}

  };
  r.readAsText(f);

// ======================================================
// UTILITIES
// ======================================================
function fCOP(n){
  if(!n&&n!==0)return'—';
  if(n>=1000000000)return'$'+(n/1000000000).toFixed(1)+'B';
  if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)return'$'+(n/1000).toFixed(0)+'K';
  return'$'+n;
}
function fDate(d){
  if(!d)return'—';
  const[y,m,day]=d.split('-');
  const mo=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return`${parseInt(day)} ${mo[parseInt(m)-1]}`;
}
function daysLeft(d){
  if(!d)return null;
  return Math.ceil((new Date(d)-new Date())/86400000);
}
function bdg(cls,txt){return`<span class="badge ${cls}">${txt}</span>`;}
function priBdg(p){return bdg(PCOLORS[p]||'bgray',p);}
function stBdg(s){return bdg(STATUSBADGE[s]||'bgray',s);}
function ava(name){
  const c=ACOLORS[name]||'#7880A8';
  const i=(name||'?').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
  return`<span class="avatar" style="background:${c}22;color:${c}" title="${name}">${i}</span>`;
}
function acBdg(area){
  const c=AREACOLOR[area]||'#7880A8';
  return`<span class="badge" style="background:${c}22;color:${c}">${area}</span>`;
}
function dLeft(d){
  const n=daysLeft(d);
  if(n===null)return'';
  if(n<0)return`<span style="color:var(--red);font-size:11px">Vencida</span>`;
  if(n===0)return`<span style="color:var(--accent);font-size:11px">Hoy</span>`;
  if(n<=3)return`<span style="color:var(--gold);font-size:11px">${n}d</span>`;
  return`<span style="color:var(--muted);font-size:11px">${n}d</span>`;
}
function pBar(pct){return`<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>`;}

// ======================================================
// TASKS — solo lectura desde Firestore (sistema externo)
// Fuente: colección "tasks" compartida con Tareas Promesas
// https://coachpaulinaa21.github.io/Tareas-promesas/
//
// Estructura esperada de cada doc en Firestore:
//   texto / name / title / text  → nombre de la tarea
//   completed (bool)             → true = lista
//   assignee / responsible / persona → responsable
//   priority / prioridad         → Alta / Media / Normal / Urgente
//   project / proyecto / dependencia → proyecto relacionado
//
// Promesas OS NO escribe en tasks. Solo lee y muestra.
// ======================================================

// ── Detecta si una tarea está completada sin importar qué campo use el sistema externo
function taskEsLista(t){
  if(t.completed === true)  return true;
  if(t.done      === true)  return true;
  if(t.checked   === true)  return true;
  const s = (t.status || t.estado || '').toLowerCase();
  if(s === 'lista' || s === 'lista ✅' || s === 'completada' || s === 'done' || s === 'complete') return true;
  return false;
}

// ── Nombre de la tarea (acepta cualquier campo)
function taskNombre(t){
  return t.texto || t.name || t.title || t.text || t.tarea || '(sin nombre)';
}

// ── Responsable
function taskResp(t){
  return t.assignee || t.responsible || t.responsable || t.persona || '';
}

// ── Prioridad — normaliza al sistema de badges existente
function taskPri(t){
  const raw = (t.priority || t.prioridad || 'Normal').toString();
  // mapear "Alta"→Alta, "Media"→Media, cualquier otro→Normal
  if(/alta|urgente/i.test(raw))  return 'Alta';
  if(/media/i.test(raw))         return 'Media';
  return 'Normal';
}
const TASK_PRI_BADGE = { Alta:'bo', Media:'bg2', Normal:'bgray', Urgente:'br' };

// ── Proyecto / dependencia
function taskProyecto(t){
  return t.project || t.proyecto || t.dependencia || t.dependency || '';
}

function renderTasks(){
  let fResp='todos', fStatus='todos';
  try{fResp   = document.getElementById('t-resp-f')?.value   || 'todos';}catch(e){}
  try{fStatus = document.getElementById('t-status-f')?.value || 'todos';}catch(e){}

  // Usar TODAS las tareas de Firestore, sin excluir ninguna
  let tasks = [...data.tasks];

  // Filtro responsable
  if(fResp !== 'todos') tasks = tasks.filter(t => taskResp(t) === fResp);

  // Filtro estado
  if(fStatus === 'Pendiente') tasks = tasks.filter(t => !taskEsLista(t));
  else if(fStatus === 'Lista') tasks = tasks.filter(t =>  taskEsLista(t));

  // Orden: pendientes primero, luego listas; dentro de cada grupo por orden natural
  tasks.sort((a, b) => {
    const aL = taskEsLista(a) ? 1 : 0;
    const bL = taskEsLista(b) ? 1 : 0;
    return aL - bL;
  });

  const totalTasks   = data.tasks.length;
  const pendingCount = data.tasks.filter(t => !taskEsLista(t)).length;
  const doneCount    = data.tasks.filter(t =>  taskEsLista(t)).length;

  // Responsables únicos reales presentes en Firestore
  const responsables = [...new Set(data.tasks.map(t => taskResp(t)).filter(Boolean))].sort();

  return`
<div class="section-title">
  <span>✅ Tablero de Ejecución</span>
  <a href="https://coachpaulinaa21.github.io/Tareas-promesas/" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none"><i class="ti ti-external-link"></i> Gestionar tareas</a>
</div>
<div style="background:var(--elevated);border:1px dashed var(--borderS);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:7px">
  <i class="ti ti-eye" style="font-size:14px;color:var(--accent)"></i>
  Visor estratégico — sincronizado en tiempo real. Total en Firestore: <strong style="color:var(--text);margin:0 3px">${totalTasks}</strong> tareas · <strong style="color:var(--accent);margin:0 3px">${pendingCount}</strong> pendientes · <strong style="color:var(--green);margin:0 3px">${doneCount}</strong> listas
</div>
<div class="filter-bar">
  <select class="fsel" id="t-resp-f" onchange="renderContent()">
    <option value="todos">Todos</option>
    ${responsables.map(r=>`<option value="${r}">${r}</option>`).join('')}
  </select>
  <select class="fsel" id="t-status-f" onchange="renderContent()">
    <option value="todos">Todos los estados</option>
    <option value="Pendiente">Pendiente</option>
    <option value="Lista">Lista</option>
  </select>
  <span style="font-size:12px;color:var(--muted);margin-left:4px">${tasks.length} tareas mostradas</span>
</div>
<div class="card">
<div class="table-wrap">
<table>
<thead><tr><th style="width:24px"></th><th>Tarea</th><th>Responsable</th><th>Proyecto / Dependencia</th><th>Prioridad</th><th>Estado</th></tr></thead>
<tbody>
${tasks.length===0?`<tr><td colspan="6"><div class="empty-state"><i class="ti ti-checkbox"></i>No hay tareas con estos filtros</div></td></tr>`:''}
${tasks.map(t=>{
  const lista    = taskEsLista(t);
  const nombre   = taskNombre(t);
  const resp     = taskResp(t);
  const pri      = taskPri(t);
  const proyecto = taskProyecto(t);
  const estadoBadge = lista
    ? '<span class="badge bgreen">Lista</span>'
    : '<span class="badge bgray">Pendiente</span>';
  return`<tr style="${lista?'opacity:.45':''}">
  <td><span class="dot ${lista?'dot-g':pri==='Alta'?'dot-o':'dot-gr'}"></span></td>
  <td><div style="font-size:13px;${lista?'text-decoration:line-through;color:var(--muted)':''}">${nombre}</div></td>
  <td>${resp?ava(resp)+'<span style="font-size:12px;color:var(--muted);margin-left:4px">'+resp+'</span>':'—'}</td>
  <td style="font-size:12px;color:var(--muted);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${proyecto||'—'}</td>
  <td>${bdg(TASK_PRI_BADGE[pri]||'bgray',pri)}</td>
  <td>${estadoBadge}</td>
</tr>`;
}).join('')}
</tbody>
</table>
</div>
</div>`;
}

window.addBrain = async function(e,key,inp){
  if(e.key==='Enter'&&inp.value.trim()){
    const item={id:data.nid.b++,text:inp.value.trim(),date:new Date().toISOString().split('T')[0]};
    if(!data.brain[key]) data.brain[key]=[];
    data.brain[key].unshift(item);
    inp.value='';
    await saveBrain();
    await saveNid();
    const el=document.getElementById('brain-'+key);
    if(el) el.innerHTML=(data.brain[key]||[]).map(item=>`
      <div class="brain-item">
        <div style="flex:1;line-height:1.5">${item.text}</div>
        <button class="btn-icon btn" onclick="removeBrain('${key}',${item.id})" style="color:var(--muted);flex-shrink:0"><i class="ti ti-x" style="font-size:12px"></i></button>
      </div>`).join('');
  }
};

window.removeBrain = async function(key,id){
  data.brain[key]=data.brain[key].filter(i=>i.id!==id);
  await saveBrain();
  const el=document.getElementById('brain-'+key);
  if(el) el.innerHTML=(data.brain[key]||[]).map(item=>`
    <div class="brain-item">
      <div style="flex:1;line-height:1.5">${item.text}</div>
      <button class="btn-icon btn" onclick="removeBrain('${key}',${item.id})" style="color:var(--muted);flex-shrink:0"><i class="ti ti-x" style="font-size:12px"></i></button>
    </div>`).join('');
};

function render(){renderNav();renderContent();}

// ======================================================
// MODAL SYSTEM
// ======================================================
window.overlayClick = function(e){if(e.target===document.getElementById('modal-overlay'))closeModal();};
window.closeModal = function(){document.getElementById('modal-overlay').classList.remove('open');};
window.openModal = function(type,id){
  const item=id!=null?data[type].find(x=>x.id===id):null;
  const box=document.getElementById('modal-box');
  box.innerHTML=buildForm(type,item);
  document.getElementById('modal-overlay').classList.add('open');
};
window.editItem = function(type,id){openModal(type,id);};
window.deleteItem = async function(type,id){
  if(!confirm('¿Eliminar este registro?'))return;
  data[type]=data[type].filter(x=>x.id!==id);
  await deleteItemFromFS(type, id);
  closeModal();renderContent();
};

// after form renders, set correct select values
function setSelectAfterRender(type, item){
  if(!item) return;
  const setVal = (id, val) => { const el=document.getElementById(id); if(el&&val!=null) el.value=val; };
  if(type==='contacts') setVal('f-role', item.role);
  if(type==='financial'){setVal('f-type', item.type); setVal('f-status', item.status);}
  if(type==='alliances'){setVal('f-type', item.type); setVal('f-status', item.status); setVal('f-value', item.value);}
}

function ee(v){return(v||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function getVal(id){const el=document.getElementById(id);return el?el.value:'';}

window.saveForm = async function(type,id){
  let obj={};
  if(type==='pipeline'){
    obj={name:getVal('f-name'),area:getVal('f-area'),stage:getVal('f-stage'),value:parseFloat(getVal('f-value'))||0,probability:parseFloat(getVal('f-prob'))||0,contact:getVal('f-contact'),closeDate:getVal('f-close'),responsible:getVal('f-resp'),nextStep:getVal('f-next'),notes:getVal('f-notes')};
  } else if(type==='projects'){
    obj={name:getVal('f-name'),area:getVal('f-area'),status:getVal('f-status'),priority:getVal('f-pri'),owner:getVal('f-owner'),progress:parseInt(getVal('f-prog'))||0,dueDate:getVal('f-due'),notes:getVal('f-notes')};
  } else if(type==='tasks'){
    obj={name:getVal('f-name'),project:getVal('f-proj'),responsible:getVal('f-resp'),priority:getVal('f-pri'),energy:getVal('f-energy'),status:getVal('f-status'),dueDate:getVal('f-due'),notes:getVal('f-notes')};
  } else if(type==='contacts'){
    obj={name:getVal('f-name'),org:getVal('f-org'),role:getVal('f-role'),priority:getVal('f-pri'),phone:getVal('f-phone'),email:getVal('f-email'),project:getVal('f-proj'),lastContact:getVal('f-last'),nextStep:getVal('f-next'),notes:getVal('f-notes')};
  } else if(type==='financial'){
    obj={concept:getVal('f-name'),line:getVal('f-line'),type:getVal('f-type'),amount:parseFloat(getVal('f-amount'))||0,status:getVal('f-status'),expectedDate:getVal('f-date'),notes:getVal('f-notes')};
  } else if(type==='alliances'){
    obj={name:getVal('f-name'),type:getVal('f-type'),status:getVal('f-status'),contact:getVal('f-contact'),value:getVal('f-value'),nextMove:getVal('f-next'),notes:getVal('f-notes')};
  }

  const nidMap={pipeline:'pi',projects:'p',tasks:'t',contacts:'c',financial:'f',alliances:'a'};

  if(id!==null && id!=='null' && id!==undefined){
    const numId = typeof id === 'string' ? parseInt(id) : id;
    const idx=data[type].findIndex(x=>x.id===numId);
    if(idx>-1){
      data[type][idx]={...data[type][idx],...obj};
      await saveItem(type, data[type][idx]);
    }
  } else {
    const nk=nidMap[type];
    obj.id=data.nid[nk]++;
    data[type].push(obj);
    await saveItem(type, obj);
    await saveNid();
  }
  closeModal();renderContent();
};

// ======================================================
// INIT
// ======================================================
async function init(){
  try{
    await seedIfEmpty();
    await loadFromFirestore();
    attachListeners();
    initialized = true;

    // Hide loading, show UI
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('topbar').style.display='flex';
    document.getElementById('main').style.display='block';

    render();
    syncDot('ok');
  } catch(err){
    console.error('Init error:', err);
    document.querySelector('#loading-screen .sub').textContent = 'Error al conectar: '+err.message;
    document.querySelector('#loading-screen .spinner').style.display='none';
  }
}

init();
</script>
