:root{--bg:#070810;--surface:#0C0E1A;--card:#111425;--elevated:#181B2E;--border:rgba(255,255,255,0.07);--borderS:rgba(255,255,255,0.13);--accent:#FF6B2B;--gold:#FFB547;--text:#E8E9F5;--muted:#7880A8;--dim:#2E3358;--green:#22C87F;--red:#FF4D5E;--blue:#4B9FFF;--purple:#9B7BFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;height:54px;gap:0}
#logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;margin-right:1.5rem;white-space:nowrap;flex-shrink:0}
#logo span{color:var(--text)}
.nav-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;flex:1}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{padding:0 0.9rem;height:54px;display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.ntab:hover{color:var(--text)}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ntab .ti{font-size:15px}
.topbar-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
#main{padding:1.5rem;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.ctitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:1rem 1.1rem}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.br{background:rgba(255,77,94,.15);color:#FF7A87}
.bo{background:rgba(255,107,43,.15);color:#FF8C5C}
.bg2{background:rgba(255,181,71,.15);color:#FFB547}
.bgreen{background:rgba(34,200,127,.15);color:#22C87F}
.bblue{background:rgba(75,159,255,.15);color:#4B9FFF}
.bpurple{background:rgba(155,123,255,.15);color:#B8A0FF}
.bgray{background:rgba(255,255,255,.08);color:var(--muted)}
.btn{padding:7px 13px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#ff8050}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--borderS)}
.btn-ghost:hover{color:var(--text);background:var(--elevated)}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-icon{padding:5px;width:28px;height:28px;justify-content:center;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted)}
.btn-icon:hover{color:var(--text);border-color:var(--borderS);background:var(--elevated)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 10px;font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.kanban-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:1rem}
.kanban-scroll::-webkit-scrollbar{height:4px}
.kanban-scroll::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.kcol{flex:0 0 200px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem}
.kcol-header{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.kcard{background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.kcard:hover{border-color:var(--accent)}
.kcard-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:5px;line-height:1.3}
.kcard-val{font-size:13px;font-weight:700;color:var(--gold)}
.kcard-meta{font-size:11px;color:var(--muted);margin-top:5px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--borderS);border-radius:16px;width:95%;max-width:540px;max-height:90vh;overflow-y:auto;padding:1.5rem}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:1.25rem;color:var(--text)}
.fg{margin-bottom:.9rem}
.fl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
.fc{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--borderS);background:var(--elevated);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.fc:focus{border-color:var(--accent)}
select.fc option{background:var(--elevated)}
textarea.fc{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.fsel{padding:6px 10px;border-radius:8px;border:1px solid var(--borderS);background:var(--elevated);color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif}
.prog-wrap{height:4px;background:var(--elevated);border-radius:2px;overflow:hidden;width:80px}
.prog-fill{height:100%;border-radius:2px;background:var(--accent)}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.section-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty-state .ti{font-size:34px;margin-bottom:8px;display:block}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-r{background:var(--red)}.dot-o{background:var(--accent)}.dot-g{background:var(--green)}.dot-gr{background:var(--muted)}
.avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.foco-box{background:var(--elevated);border:1px dashed var(--borderS);border-radius:10px;padding:.9rem}
.foco-textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;outline:none;line-height:1.6}
.brain-item{padding:9px 11px;background:var(--elevated);border-radius:8px;margin-bottom:6px;font-size:13px;display:flex;justify-content:space-between;align-items:start;gap:8px;line-height:1.5}
.brain-input{width:100%;padding:8px 10px;border-radius:8px;border:1px dashed var(--borderS);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:8px}
.brain-input::placeholder{color:var(--muted)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
@media(max-width:768px){#main{padding:1rem}.form-row{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}.ntab{padding:0 .7rem;font-size:11px}#logo{margin-right:.8rem}}
</style>
</head>

// ======================================================
// UTILITIES
// ======================================================
function fCOP(n){
  if(!n&&n!==0)return'—';
  if(n>=1000000000)return'$'+(n/1000000000).toFixed(1)+'B';
  if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)return'$'+(n/1000).toFixed(0)+'K';
  return'$'+n;
}
function fDate(d){
  if(!d)return'—';
  const[y,m,day]=d.split('-');
  const mo=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return`${parseInt(day)} ${mo[parseInt(m)-1]}`;
}
function daysLeft(d){
  if(!d)return null;
  return Math.ceil((new Date(d)-new Date())/86400000);
}
function bdg(cls,txt){return`<span class="badge ${cls}">${txt}</span>`;}
function priBdg(p){return bdg(PCOLORS[p]||'bgray',p);}
function stBdg(s){return bdg(STATUSBADGE[s]||'bgray',s);}
function ava(name){
  const c=ACOLORS[name]||'#7880A8';
  const i=(name||'?').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
  return`<span class="avatar" style="background:${c}22;color:${c}" title="${name}">${i}</span>`;
}
function acBdg(area){
  const c=AREACOLOR[area]||'#7880A8';
  return`<span class="badge" style="background:${c}22;color:${c}">${area}</span>`;
}
function dLeft(d){
  const n=daysLeft(d);
  if(n===null)return'';
  if(n<0)return`<span style="color:var(--red);font-size:11px">Vencida</span>`;
  if(n===0)return`<span style="color:var(--accent);font-size:11px">Hoy</span>`;
  if(n<=3)return`<span style="color:var(--gold);font-size:11px">${n}d</span>`;
  return`<span style="color:var(--muted);font-size:11px">${n}d</span>`;
}
function pBar(pct){return`<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>`;}

function renderBrain(){
  const sections=[
    {key:'ideas',icon:'ti-bulb',label:'Ideas rápidas',color:'#FFB547',placeholder:'Captura cualquier idea sin filtro...'},
    {key:'pending',icon:'ti-alert-circle',label:'Pendientes mentales',color:'#FF6B2B',placeholder:'Lo que tienes en la cabeza y no has delegado...'},
    {key:'decisions',icon:'ti-scale',label:'Decisiones importantes',color:'#4B9FFF',placeholder:'Decisiones que requieren tu criterio...'},
    {key:'personal',icon:'ti-heart',label:'Seguimiento personal',color:'#EC4899',placeholder:'Promesas hechas, cosas que revisar...'}
  ];
  return`
<div class="section-title"><span>🧠 Cerebro Vivo</span></div>
<div class="grid-2">
${sections.map(s=>`
  <div class="card">
    <div class="card-header">
      <div class="ctitle" style="color:${s.color}"><i class="ti ${s.icon}"></i> ${s.label}</div>
    </div>
    <input class="brain-input" placeholder="${s.placeholder}" onkeydown="addBrain(event,'${s.key}',this)">
    <div id="brain-${s.key}">
    ${(data.brain[s.key]||[]).map(item=>`
      <div class="brain-item">
        <div style="flex:1;line-height:1.5">${item.text}</div>
        <button class="btn-icon btn" onclick="removeBrain('${s.key}',${item.id})" style="color:var(--muted);flex-shrink:0"><i class="ti ti-x" style="font-size:12px"></i></button>
      </div>`).join('')}
    </div>
  </div>`).join('')}
</div>`;
}

function addBrain(e,key,inp){
  if(e.key==='Enter'&&inp.value.trim()){
    const item={id:data.nid.b++,text:inp.value.trim(),date:new Date().toISOString().split('T')[0]};
    data.brain[key].unshift(item);
    inp.value='';save();
    document.getElementById('brain-'+key).innerHTML=(data.brain[key]||[]).map(item=>`
      <div class="brain-item">
        <div style="flex:1;line-height:1.5">${item.text}</div>
        <button class="btn-icon btn" onclick="removeBrain('${key}',${item.id})" style="color:var(--muted);flex-shrink:0"><i class="ti ti-x" style="font-size:12px"></i></button>
      </div>`).join('');
  }
}
function removeBrain(key,id){
  data.brain[key]=data.brain[key].filter(i=>i.id!==id);save();
  document.getElementById('brain-'+key).innerHTML=(data.brain[key]||[]).map(item=>`
    <div class="brain-item">
      <div style="flex:1;line-height:1.5">${item.text}</div>
      <button class="btn-icon btn" onclick="removeBrain('${key}',${item.id})" style="color:var(--muted);flex-shrink:0"><i class="ti ti-x" style="font-size:12px"></i></button>
    </div>`).join('');
}

function renderContent(){

// ======================================================
// MODAL SYSTEM
// ======================================================
function overlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function openModal(type,id){
  const item=id?data[type].find(x=>x.id===id):null;
  const box=document.getElementById('modal-box');
  box.innerHTML=buildForm(type,item);
  document.getElementById('modal-overlay').classList.add('open');
}
function editItem(type,id){openModal(type,id);}
function deleteItem(type,id){
  if(!confirm('¿Eliminar este registro?'))return;
  data[type]=data[type].filter(x=>x.id!==id);save();closeModal();renderContent();
}

function buildForm(type,item){

    <div class="fg"><label class="fl">Notas</label><textarea class="fc" id="f-notes">${e(item?.notes)}</textarea></div>`;
  } else if(type==='contacts'){

    <div class="form-row">
      <div class="fg"><label class="fl">Nombre</label><input class="fc" id="f-name" value="${e(item?.name)}"></div>

function e(v){return(v||'').toString().replace(/"/g,'&quot;');}

function getVal(id){const el=document.getElementById(id);return el?el.value:'';}

function saveForm(type,id){
  let obj={};
  if(type==='pipeline'){
    obj={name:getVal('f-name'),area:getVal('f-area'),stage:getVal('f-stage'),value:parseFloat(getVal('f-value'))||0,probability:parseFloat(getVal('f-prob'))||0,contact:getVal('f-contact'),closeDate:getVal('f-close'),responsible:getVal('f-resp'),nextStep:getVal('f-next'),notes:getVal('f-notes')};
  } else if(type==='projects'){
    obj={name:getVal('f-name'),area:getVal('f-area'),status:getVal('f-status'),priority:getVal('f-pri'),owner:getVal('f-owner'),progress:parseInt(getVal('f-prog'))||0,dueDate:getVal('f-due'),notes:getVal('f-notes')};
  } else if(type==='tasks'){
    obj={name:getVal('f-name'),project:getVal('f-proj'),responsible:getVal('f-resp'),priority:getVal('f-pri'),energy:getVal('f-energy'),status:getVal('f-status'),dueDate:getVal('f-due'),notes:getVal('f-notes')};
  } else if(type==='contacts'){
    obj={name:getVal('f-name'),org:getVal('f-org'),role:getVal('f-role'),priority:getVal('f-pri'),phone:getVal('f-phone'),email:getVal('f-email'),project:getVal('f-proj'),lastContact:getVal('f-last'),nextStep:getVal('f-next'),notes:getVal('f-notes')};
  } else if(type==='financial'){
    obj={concept:getVal('f-name'),line:getVal('f-line'),type:getVal('f-type'),amount:parseFloat(getVal('f-amount'))||0,status:getVal('f-status'),expectedDate:getVal('f-date'),notes:getVal('f-notes')};
  } else if(type==='alliances'){
    obj={name:getVal('f-name'),type:getVal('f-type'),status:getVal('f-status'),contact:getVal('f-contact'),value:getVal('f-value'),nextMove:getVal('f-next'),notes:getVal('f-notes')};
  }
  const nidMap={pipeline:'pi',projects:'p',tasks:'t',contacts:'c',financial:'f',alliances:'a'};
  if(id&&id!==null){
    const idx=data[type].findIndex(x=>x.id===id);
    if(idx>-1)data[type][idx]={...data[type][idx],...obj};
  } else {
    const nk=nidMap[type];
    obj.id=data.nid[nk]++;
    data[type].push(obj);
  }
  save();closeModal();renderContent();
}
